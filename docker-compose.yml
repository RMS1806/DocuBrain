version: '3.8'

# Load environment variables from .env file
# All secrets live in .env — do NOT hard-code credentials here.

services:

  # ─────────────────────────────────────────
  # 4. THE MEMORY (Database)
  # ─────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: docubrain_db
    restart: on-failure
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ─────────────────────────────────────────
  # 5. THE POST OFFICE (Message Broker)
  # ─────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: docubrain_redis
    restart: on-failure
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  # ─────────────────────────────────────────
  # 6. THE WAREHOUSE (Object Storage)
  # ─────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: docubrain_minio
    restart: on-failure
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${AWS_ACCESS_KEY_ID}
      MINIO_ROOT_PASSWORD: ${AWS_SECRET_ACCESS_KEY}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      # MinIO exposes a /minio/health/live endpoint
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 15s



  # ─────────────────────────────────────────
  # 1. THE BRAIN (API)
  # ─────────────────────────────────────────
  backend:
    build:
      context: ./backend
    container_name: docubrain_backend
    restart: on-failure
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/code
    # Only start AFTER every dependency is actually healthy
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

    environment:
      # asyncpg driver required for SQLAlchemy 2.0 AsyncSession
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db/${POSTGRES_DB}
      # psycopg2 URL used internally by database.py for the sync engine (Celery compat)
      SYNC_DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379/0
      # DB index 1 is dedicated to app-level caching (separate from Celery broker)
      REDIS_CACHE_URL: redis://redis:6379/1
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      PINECONE_API_KEY: ${PINECONE_API_KEY}
      PINECONE_INDEX_NAME: ${PINECONE_INDEX_NAME}
      S3_ENDPOINT: minio:9000
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_REGION: ${AWS_REGION}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME}
      FRONTEND_URL: ${FRONTEND_URL}

  # ─────────────────────────────────────────
  # 2. THE MUSCLE (Async Worker)
  # ─────────────────────────────────────────
  worker:
    build:
      context: ./backend
    container_name: docubrain_worker
    restart: on-failure
    command: celery -A app.docubrain_tasks worker --loglevel=info --concurrency=2
    volumes:
      - ./backend:/code
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

    environment:
      # Worker uses sync psycopg2 engine (no asyncpg)
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db/${POSTGRES_DB}
      SYNC_DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379/0
      REDIS_CACHE_URL: redis://redis:6379/1
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      PINECONE_API_KEY: ${PINECONE_API_KEY}
      PINECONE_INDEX_NAME: ${PINECONE_INDEX_NAME}
      S3_ENDPOINT: minio:9000
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_REGION: ${AWS_REGION}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME}

  # ─────────────────────────────────────────
  # 3. THE FACE (Frontend)
  # ─────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
    container_name: docubrain_frontend
    restart: on-failure
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    environment:
      WATCHPACK_POLLING: "true"
      VITE_API_URL: http://localhost:8000

# ─────────────────────────────────────────
# PERSISTENT STORAGE VOLUMES
# ─────────────────────────────────────────
volumes:
  postgres_data:
  minio_data: